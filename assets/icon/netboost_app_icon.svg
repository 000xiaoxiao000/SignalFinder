<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="160" y1="96" x2="864" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F3A40"/>
      <stop offset="0.52" stop-color="#082A2F"/>
      <stop offset="1" stop-color="#04161A"/>
    </linearGradient>
    <linearGradient id="pin" x1="512" y1="250" x2="512" y2="712" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4FFFC"/>
      <stop offset="1" stop-color="#BCF4E2"/>
    </linearGradient>
    <linearGradient id="dot" x1="470" y1="388" x2="554" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8FF7A"/>
      <stop offset="1" stop-color="#28DDC8"/>
    </linearGradient>
    <linearGradient id="wave" x1="320" y1="300" x2="704" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#28DDC8"/>
      <stop offset="0.5" stop-color="#6FEAA0"/>
      <stop offset="1" stop-color="#E6FF6A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.16 0 0 0 0 0.90 0 0 0 0 0.80 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="214" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="214" fill="none" stroke="#23474C" stroke-width="16"/>

  <g opacity="0.34" fill="none" stroke="#2F8E85">
    <circle cx="512" cy="430" r="300" stroke-width="2"/>
    <circle cx="512" cy="430" r="232" stroke-width="2"/>
  </g>

  <g fill="none" stroke="url(#wave)" stroke-linecap="round">
    <path d="M349 327 A232 232 0 0 1 675 327" stroke-width="30" opacity="0.95"/>
    <path d="M306 286 A300 300 0 0 1 718 286" stroke-width="30" opacity="0.7"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M512 712 L372 540 A180 180 0 1 1 652 540 Z" fill="url(#pin)"/>
    <circle cx="512" cy="430" r="118" fill="#0A2A2E"/>
    <circle cx="512" cy="430" r="118" fill="none" stroke="#35E0C0" stroke-width="14" opacity="0.85"/>
    <circle cx="512" cy="430" r="52" fill="url(#dot)" filter="url(#glow)"/>
  </g>
</svg>
